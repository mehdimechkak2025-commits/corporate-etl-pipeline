name: Daily Market Intel ETL

on:
  schedule:
    - cron: "0 8 * * *" # Runs every day at 8:00 AM UTC
  workflow_dispatch: # "Run Now" button

# Give the robot security clearance to push code back to the repo
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      # Step A: Download your code (Updated to v4 to fix warnings)
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Install Python (Updated to v5 to fix warnings)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step C: Install your tools
      - name: Install Dependencies
        run: pip install pandas requests

      # Step D: Run your pipeline
      - name: Run ETL Script
        env: # <--- This tells the robot to unlock the GitHub vault
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python extract.py

      # Step E: Save the data and push it back to GitHub!
      - name: Auto-Commit New Data
        run: |
          git config --global user.name "Market Intel Bot"
          git config --global user.email "actions@github.com"
          git add market_intel_jobs.csv
          git commit -m "Automated data update: Fresh job market intel" || echo "No changes to commit"
          git push